name: core
version: 0.1.0
summary: >
  The conventions every other module builds on: the Templates root, the vault
  home note, and the frontmatter and naming rules that humans and agents share.
provides:
  folders:
    - "Templates"
  templates:
    - "Templates/Note.md"
  skills:
    - vault-bootstrap
    - vault-conventions
    - obsidian-tasks
    - obsidian-templater
seeds:
  - "Home.md"
  - ".obsidian/community-plugins.json"
post_install: |
  Open Home.md in Obsidian; it explains what was installed and how the safety
  contract works. The note is seeded: it is yours now, replace it freely.

  Onyx's templates use the Tasks and Templater community plugins, and the vault
  enables both. Onyx can enable plugins but cannot install them, so add them
  once from Obsidian: Settings > Community plugins > Browse > "Tasks" and
  "Templater", then point Templater's template folder at Templates/.
