name: core
version: 0.1.3
summary: >
  The conventions every other module builds on: the Templates root, the vault
  home note, and the frontmatter and naming rules that humans and agents share.
provides:
  folders:
    - "Templates"
  templates:
    - "Templates/Note.md"
  skills:
    - vault-bootstrap
    - vault-conventions
    - obsidian-tasks
    - obsidian-templater
    - vault-operations
seeds:
  - "Home.md"
  - ".obsidian/community-plugins.json"
post_install: |
  Open Home.md in Obsidian; it explains what was installed and how the safety
  contract works. The note is seeded: it is yours now, replace it freely.

  Onyxian's templates use the Tasks and Templater community plugins, and the vault
  enables both. With Obsidian open you can install them from the keyboard —
  `obsidian plugin:install id=obsidian-tasks-plugin enable` and
  `id=templater-obsidian` (run `obsidian plugins:restrict off` first on a fresh
  vault) — or add them from Settings > Community plugins > Browse. Then point
  Templater's template folder at Templates/. Your Claude Code agents will offer
  to do this for you, asking first.
