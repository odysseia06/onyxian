name: projects-software
version: 0.2.4
summary: >
  Per-project software engineering notes: a copy-per-project template subtree
  (overview, devlog, tasks, research), dated devlog entries, typed task and
  feature notes with a status-driven Base, and subsystem notes that grow with
  the architecture.
depends: [core]
variables:
  - key: root
    prompt: "Folder for software projects"
    default: "Projects/Software"
provides:
  folders:
    - "{{root}}/_Project-Template/Devlog"
    - "{{root}}/_Project-Template/Tasks"
    - "{{root}}/_Project-Template/Research"
    - "{{root}}/_Project-Template/Assets"
  templates:
    - "Templates/Projects/*.md"
  bases:
    - "{{root}}/Project-Tasks.base"
  skills:
    - devlogs
  agents:
    - project-steward
seeds:
  - "{{root}}/_Project-Template/00 Overview.md"
post_install: |
  Start a project with `onyxian project new "<Name>"`: it scaffolds a sibling of
  _Project-Template with the Devlog/Tasks/Research/Assets folders and a dated
  Overview to fill in. Subsystem folders (renderer, runtime, api, ...) are
  yours to add per project as the architecture demands; the devlogs skill
  documents the rhythm.
