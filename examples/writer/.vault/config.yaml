# Onyxian instance config — declares intent: which modules, with which variables.
# This file is yours to edit; run `onyxian plan` to preview the effect
# and `onyxian apply` to reconcile the vault to it.
framework:
  version: "1.1.0"
  runtimes: [claude-code]
vault:
  name: "My Vault"
naming:
  folder_style: Title-Case-Hyphen
modules:
  core: { version: "0.1.3" }
  daily-notes: { version: "0.2.3", vars: { root: "Daily-Notes", granularity: "YYYY/MM" } }
  reading: { version: "0.2.2", vars: { root: "Reading" } }
  writing: { version: "0.1.1", vars: { root: "Writing/Blog" } }
