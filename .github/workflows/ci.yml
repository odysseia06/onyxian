# The 3-OS matrix is live from M0, per KICKSTART.md §9.5 and §11 — Windows is
# first-class from the first commit, not retrofitted. The suite includes the
# golden-file and idempotency tests, so byte-exactness across OSes is enforced
# on every push.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest tests -q --cov=onyxian --cov-report=term-missing:skip-covered
      - name: Generated artifacts are regenerable, not drifted
        run: |
          python tools/regen_golden.py
          python tools/gen_examples.py
          python tools/build_plugin.py
          git diff --exit-code -- tests/fixtures/golden examples plugin .claude-plugin

  # Lint + types. One OS, one Python: the 3x2 test matrix already covers behavior,
  # and `mypy --platform win32` below re-checks the one sys.platform-sensitive spot
  # (the cli.py stream shim) without Windows hardware. `ruff check .` is safe from
  # the root — every tracked .py file lives under core/, tests/, or tools/; the
  # data trees (modules/, profiles/, examples/) contain no Python, and dist/.venv
  # are gitignored, which ruff respects. ruff and mypy are pinned in the dev extra.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy
        run: mypy
      - name: Mypy (Windows platform)
        run: mypy --platform win32

  # Build the wheel and drive it from a clean venv OUTSIDE the checkout — the one
  # place ci exercises the shipped artifact rather than an editable install. This
  # is what catches a broken force-include (the bundled module library): in the
  # venv, repo.py's checkout fallback resolves to a dir with no modules/, so
  # "cannot locate the module library" fails loudly instead of being masked.
  # ONYXIAN_HOME is unset so it cannot rescue the lookup; ONYXIAN_NOW is unset so
  # this is the real-clock path a user actually gets.
  wheel-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build the wheel
        run: |
          python -m pip install build
          python -m build --wheel
      - name: Install into a clean venv and run init + doctor off-checkout
        shell: bash
        run: |
          unset ONYXIAN_HOME ONYXIAN_NOW   # test the wheel's own lookup + the real clock
          python -m venv "$RUNNER_TEMP/venv"
          BIN="$RUNNER_TEMP/venv/bin"; [ "$RUNNER_OS" = "Windows" ] && BIN="$RUNNER_TEMP/venv/Scripts"
          "$BIN/pip" install dist/*.whl
          cd "$RUNNER_TEMP"   # keep the smoke vault off the checkout
          printf 'vault:\n  name: "Smoke"\nmodules:\n  core: {}\n' > answers.yaml
          "$BIN/onyxian" --version
          "$BIN/onyxian" init smoke-vault --answers answers.yaml --yes
          "$BIN/onyxian" doctor --vault smoke-vault

  # A module content change must carry a module.yaml version bump — that pin is the
  # update contract's tripwire (issue #6). The check is git-only and OS-independent,
  # so one runner is enough; it's separate from the 6-way test matrix. The default
  # shallow checkout has no tags, so fetch everything: the guard diffs against the
  # last release tag reachable from HEAD. It is intentionally vacuous on a tagged
  # release commit and does its work on PRs and on main pushes before the tag exists.
  module-version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # the guard diffs against the last release tag
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Module content changes carry a version bump
        run: python tools/check_module_bumps.py
