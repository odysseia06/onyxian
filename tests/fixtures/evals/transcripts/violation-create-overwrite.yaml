skill: vault-operations
module: daily-notes
module_version: 0.2.2
scenario: violation-create-overwrite
# `create ... overwrite` over today's existing note. Trips both the create-only
# rule (native create must run only when absent) and the additive-only rule.
vault: {answers: daily.yaml, overlay: lived-in}
daily_state: clean
state: {active: Home.md}
steps:
  - [vault, info=name]
  - [daily:path]
  - [files]
  - [create, "path=Daily-Notes/2026/01/2026-01-01.md", overwrite, "content=- [ ] replaced ➕ 2026-01-01"]
expect_violations: [create-only-when-absent, additive-only]
